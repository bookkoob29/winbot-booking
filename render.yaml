# WINBOT Booking — Production Deployment (Render)
#
# Deploy on Render:
# 1. Create a "Web Service" from your GitHub repo
# 2. Set:
#    - Build Command: pip install -r requirements.txt
#    - Start Command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app:app
#    - Health Check Path: /api/health
# 3. Add Environment Variables (see below)
# 4. Add a PostgreSQL database (Render provides free 1GB Postgres)
# 5. Deploy!
#
# ── Required Environment Variables ──
#
# DATABASE_URL=postgresql://user:pass@host:5432/dbname
#   (Render auto-provides this if you add a PostgreSQL DB)
#
# TELEGRAM_BOT_TOKEN=your_bot_token
# TELEGRAM_CHAT_ID=8969930460
#
# ADMIN_PASSCODE=BooK2905@1990
# SESSION_SECRET=a-long-random-secret-string
#
# HOST=0.0.0.0
#
# ── Optional ──
# UPLOAD_DIR=/var/data/uploads/slips  (Render persistent disk path)
#
# ── How PostgreSQL works ──
# The app auto-detects DATABASE_URL env var.
# If set → uses PostgreSQL (production mode)
# If not set → uses SQLite (dev mode with bookings.db)

services:
  - type: web
    name: winbot-booking
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ADMIN_PASSCODE
        value: BooK2905@1990
      - key: SESSION_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: TELEGRAM_CHAT_ID
        value: 8969930460
      - key: DATABASE_URL
        fromDatabase:
          name: winbot-booking-db
          property: connectionString

databases:
  - name: winbot-booking-db
    plan: free
