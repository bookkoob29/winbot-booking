{% extends "base.html" %}
{% block title %}Admin Login | WINBOT{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-2">Admin Login</h1>
        <p class="text-gray-400 text-center text-sm mb-6">WINBOT Booking System</p>

        {% if error %}
        <div class="p-3 bg-red-50 text-red-700 rounded-lg text-sm mb-4">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Passcode</label>
                <input type="password" name="passcode" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                       placeholder="กรอกรหัสผ่าน">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition-all">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>
</div>
{% endblock %}
